rules:
  - id: forge.security.hardcoded-secret-python
    languages: [python]
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|secret|api_key|apikey|token|private_key|aws_access|sk_live|secret_key|auth_token|access_token)
    pattern-not-inside: |
      def test_...(...):
          ...
    message: "Hardcoded secret in variable '$VAR'. Use environment variables or a secrets manager instead."
    severity: ERROR
    metadata:
      category: security
      subcategory: hardcoded-secrets
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-001
      confidence: HIGH
      impact: HIGH

  - id: forge.security.hardcoded-secret-js
    languages: [javascript, typescript]
    pattern-either:
      - patterns:
          - pattern: const $VAR = "..."
          - metavariable-regex:
              metavariable: $VAR
              regex: (?i)(password|secret|api_key|apikey|token|private_key|aws_access|sk_live|secret_key|auth_token|access_token)
      - patterns:
          - pattern: let $VAR = "..."
          - metavariable-regex:
              metavariable: $VAR
              regex: (?i)(password|secret|api_key|apikey|token|private_key|aws_access|sk_live|secret_key|auth_token|access_token)
      - patterns:
          - pattern: var $VAR = "..."
          - metavariable-regex:
              metavariable: $VAR
              regex: (?i)(password|secret|api_key|apikey|token|private_key|aws_access|sk_live|secret_key|auth_token|access_token)
    message: "Hardcoded secret in variable '$VAR'. Use environment variables or a secrets manager instead."
    severity: ERROR
    metadata:
      category: security
      subcategory: hardcoded-secrets
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-002
      confidence: HIGH
      impact: HIGH

  - id: forge.security.api-key-in-source
    languages: [python, javascript, typescript]
    pattern-either:
      - pattern: $VAR = "sk-..."
      - pattern: $VAR = "AKIA..."
      - pattern: $VAR = "ghp_..."
      - pattern: $VAR = "sk_live_..."
      - pattern: $VAR = "pk_live_..."
      - pattern: $VAR = "xoxb-..."
      - pattern: $VAR = "sk_test_..."
      - pattern: $VAR = "pk_test_..."
    pattern-not-inside: |
      def test_...(...):
          ...
    message: "API key with known prefix detected in source code. Use environment variables instead."
    severity: ERROR
    metadata:
      category: security
      subcategory: hardcoded-secrets
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-003
      confidence: HIGH
      impact: HIGH

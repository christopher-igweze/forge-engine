rules:
  - id: forge.security.jwt-no-verify-options
    languages: [python]
    pattern: "jwt.decode($TOKEN, ..., options={\"verify_signature\": False}, ...)"
    message: "JWT decoded without signature verification. Always verify JWT signatures."
    severity: ERROR
    metadata:
      category: security
      subcategory: auth-bypass
      cwe:
        - "CWE-345: Insufficient Verification of Data Authenticity"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-024
      confidence: HIGH
      impact: HIGH

  - id: forge.security.jwt-no-verify-flag
    languages: [python]
    pattern: jwt.decode($TOKEN, ..., verify=False, ...)
    message: "JWT decoded with verify=False. Always verify JWT signatures."
    severity: ERROR
    metadata:
      category: security
      subcategory: auth-bypass
      cwe:
        - "CWE-345: Insufficient Verification of Data Authenticity"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-038
      confidence: HIGH
      impact: HIGH

  - id: forge.security.jwt-empty-algorithms
    languages: [python]
    pattern: "jwt.decode($TOKEN, ..., algorithms=[], ...)"
    message: "JWT decoded with empty algorithms list. Specify allowed algorithms explicitly."
    severity: ERROR
    metadata:
      category: security
      subcategory: auth-bypass
      cwe:
        - "CWE-345: Insufficient Verification of Data Authenticity"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-039
      confidence: HIGH
      impact: HIGH

  - id: forge.security.hardcoded-jwt-secret
    languages: [python]
    pattern-either:
      - pattern: jwt.encode($PAYLOAD, "...", ...)
      - pattern: jwt.decode($TOKEN, "...", ...)
    message: "JWT signed/verified with a hardcoded secret. Use an environment variable or key management service for JWT secrets."
    severity: ERROR
    metadata:
      category: security
      subcategory: auth-bypass
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-025
      confidence: HIGH
      impact: HIGH

  - id: forge.security.hardcoded-jwt-secret-js
    languages: [javascript, typescript]
    pattern-either:
      - pattern: jwt.sign($PAYLOAD, "...", ...)
      - pattern: jwt.verify($TOKEN, "...", ...)
    message: "JWT signed/verified with a hardcoded secret. Use an environment variable or key management service for JWT secrets."
    severity: ERROR
    metadata:
      category: security
      subcategory: auth-bypass
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      forge-check-id: SEC-026
      confidence: HIGH
      impact: HIGH

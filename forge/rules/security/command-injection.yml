rules:
  - id: forge.security.command-injection-os-system
    languages: [python]
    patterns:
      - pattern: os.system($ARG)
      - pattern-not: os.system("...")
    message: "Command injection risk via os.system() with dynamic argument. Use subprocess with shell=False and a list of args instead."
    severity: ERROR
    metadata:
      category: security
      subcategory: command-injection
      cwe:
        - "CWE-78: OS Command Injection"
      owasp:
        - "A03:2021 - Injection"
      forge-check-id: SEC-009
      confidence: HIGH
      impact: HIGH

  - id: forge.security.command-injection-subprocess-shell
    languages: [python]
    pattern-either:
      - pattern: subprocess.call($CMD, ..., shell=True, ...)
      - pattern: subprocess.run($CMD, ..., shell=True, ...)
      - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
      - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
      - pattern: subprocess.check_call($CMD, ..., shell=True, ...)
    message: "Command injection risk via subprocess with shell=True. Use shell=False with a list of arguments instead."
    severity: ERROR
    metadata:
      category: security
      subcategory: command-injection
      cwe:
        - "CWE-78: OS Command Injection"
      owasp:
        - "A03:2021 - Injection"
      forge-check-id: SEC-010
      confidence: HIGH
      impact: HIGH

  - id: forge.security.command-injection-js
    languages: [javascript, typescript]
    pattern-either:
      - patterns:
          - pattern: child_process.exec($CMD, ...)
          - pattern-not: child_process.exec("...", ...)
      - patterns:
          - pattern: exec($CMD, ...)
          - pattern-not: exec("...", ...)
          - pattern-inside: |
              const { exec } = require("child_process")
              ...
    message: "Command injection risk via child_process.exec() with dynamic argument. Use execFile() with arguments array instead."
    severity: ERROR
    metadata:
      category: security
      subcategory: command-injection
      cwe:
        - "CWE-78: OS Command Injection"
      owasp:
        - "A03:2021 - Injection"
      forge-check-id: SEC-011
      confidence: HIGH
      impact: HIGH

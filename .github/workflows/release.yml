name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      skip_pypi:
        description: "Skip PyPI publish (snapshot + PR only)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: version
        run: |
          version=$(python3 -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: ${{ !inputs.skip_pypi }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          python -m twine upload dist/*

  snapshot:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Daytona SDK
        run: pip install daytona

      - name: Wait for PyPI propagation
        if: ${{ !inputs.skip_pypi }}
        run: |
          # PyPI's CDN can take ~30s to serve a freshly published version
          for i in 1 2 3 4 5 6; do
            if pip index versions vibe2prod 2>&1 | grep -q "${{ needs.publish.outputs.version }}"; then
              echo "vibe2prod==${{ needs.publish.outputs.version }} is live on PyPI"
              exit 0
            fi
            echo "Attempt $i: not yet on PyPI, sleeping 10s..."
            sleep 10
          done
          echo "PyPI propagation timed out — proceeding anyway"

      - name: Build Daytona snapshot
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
          DAYTONA_TARGET: ${{ secrets.DAYTONA_TARGET }}
        run: python scripts/build_daytona_snapshot.py

  bump-vibe2prod:
    needs: [publish, snapshot]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vibe2prod
        uses: actions/checkout@v4
        with:
          repository: christopher-igweze/vibe2prod
          ref: staging
          token: ${{ secrets.VIBE2PROD_REPO_TOKEN }}

      - name: Update FORGE_SANDBOX_SNAPSHOT default in config.py
        env:
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["NEW_VERSION"]
          new_value = f'"vibe2prod-{version}"'
          path = Path("backend/config.py")
          src = path.read_text()
          pattern = re.compile(r'(forge_sandbox_snapshot:\s*str\s*=\s*)"[^"]*"')
          if not pattern.search(src):
              raise SystemExit(
                  "forge_sandbox_snapshot field not found in backend/config.py — "
                  "add it before the first release run"
              )
          updated = pattern.sub(rf'\1{new_value}', src)
          path.write_text(updated)
          PY

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.VIBE2PROD_REPO_TOKEN }}
          base: staging
          branch: bump-snapshot/${{ needs.publish.outputs.version }}
          commit-message: |
            🔧 chore(sandbox): pin to vibe2prod-${{ needs.publish.outputs.version }} snapshot

            Auto-generated by forge-engine release workflow.
          title: "🔧 chore(sandbox): pin to vibe2prod-${{ needs.publish.outputs.version }} snapshot"
          body: |
            Auto-PR from forge-engine release `v${{ needs.publish.outputs.version }}`.

            Bumps `forge_sandbox_snapshot` default in `backend/config.py` to
            point at the freshly built Daytona snapshot
            `vibe2prod-${{ needs.publish.outputs.version }}`.

            Merge after verifying the snapshot works on staging
            (`api-staging.vibe2prod.verstandai.site`).
          delete-branch: true
